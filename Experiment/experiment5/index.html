<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experiment 5</title>

    <style>
        body{
            text-align:center;
            background:linear-gradient(75deg,rgb(48, 156, 239),rgb(174, 0, 255));
            padding: 1.5rem;
            }
            h1{
            color: white;
            font-size: 5rem;
            margin-top: 3rem;
        }
        .employee-form{
            margin-top: 7rem;
            align-items: center;
            border: 1px solid black;
            display: inline-block;
            background-color: rgba(255, 255, 255, 0.8);
            padding: 2rem;
            border-radius: 1rem;
            background-color: rgba(255, 255, 255, 0.8);
        }
        button{
            margin: 1.7rem;
            padding: 0.5rem;
            block-size: 3rem;
            border-radius: 0.3rem;
            font-size: medium;
            font-weight: bold;
            width:10rem;
            cursor: pointer;
        }
            button:hover{
                transform: scale(1.05);
                transition: transform 0.3s ease;
            }
        input{
            padding: 0.5rem;
            margin: 0.5rem;
            block-size: 1.5rem;
            border-radius: 0.3rem;
            font-size: large;
        }
        #output{
            margin-top: 2rem;
            font-size: large;
            color: #333;
        }
    </style>
</head>


<body>
    <h1> Employee Management System</h1>
    <div class="employee-form">
    <input type="text" id="name" placeholder="Enter employee name">
    <input type="text" id="id" placeholder="Enter employee id">
    <input type="number" id="salary" placeholder="Enter employee salary">
    <input type="text" id="dept" placeholder="Enter employee department">
  <br>
  <div class="button">
    <button onclick="addEmployee()">Add Employee</button>
    <br>
    <button onclick="displayEmployees()">Display Employees</button>
    <button onclick="filterSalary()">Salary>50000</button>
    <button onclick="totalSalary()">Total Salary</button>
    <button onclick="avgSalary()">Average Salary</button>
    <button onclick="countByDept()">Count Department</button>
</div>
<div id="output"></div>
</div>
<script src="script.js" defer></script>
</body>
</html>
