<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experiment-6</title>
</head>
<style>
    body{
        background-color: #F2F2F2;
        font-family: Arial, sans-serif;
    }
    .container{
        padding-top: 2rem;
        margin: 5rem auto;
        border: .2rem solid #f2f2f2ce;
        border-radius: 1.75rem;
        box-shadow: #6e6b6b 0px 0px 10px;
        width: 50%;
        height: auto;
        text-align: center;
        background-color: white;    
    }
    input{
        margin-bottom: 2rem;
        padding: 0.5rem;
        border: 1px solid #cccccc;
        font-size: 1rem;
        border-radius: 0.5rem;
        width: 25rem;
    }
    button{
        margin: 0.75rem;
        padding: 1.5rem 3rem;
        border: none;
        background-color: #4CAF50;
        color: white;
        font-size: auto;
        border-radius: 0.5rem;
        cursor: pointer;
    }
</style>
<body>
    <div class="container">
        <h1 id="mainHeading">Welcome to JavaScript Lab</h1>
        <input type="text" id="userInput" placeholder="Enter new heading text">
        <br>
        <button id="changeHD"> Change Heading</button>
        <button id="changeBg"> Change Background</button>
        <button id="increaseFont"> Increase Font Size</button>
        <button id="showHidePg"> Show/Hide Paragraph</button>
        <button id="reset"> Reset</button>
         <p id="paragraph">This is a Experiment which demonstrates how JavaScript events can dynamically change its content.</p>
        </div>
        <script>
let heading = document.getElementById("mainHeading"); 
let paragraph = document.getElementById("paragraph"); 
let input = document.getElementById("userInput"); 
let fontSize = 16; 
 // Change heading text (onclick using addEventListener) 
document.getElementById("changeHD").addEventListener("click", function () { 
    if (input.value !== "") { 
        heading.innerHTML = input.value; 
    } 
}); 
 // Change background color 
document.getElementById("changeBg").onclick = function () { 
    document.body.style.backgroundColor="lightblue";         
}; 
// Increase font size 
document.getElementById("increaseFont").addEventListener("click", function () { 
    fontSize += 2; 
    paragraph.style.fontSize = fontSize + "px"; 
}); 
 //Show/Hide paragraph 
document.getElementById("showHidePg").addEventListener("click", function () { 
    if (paragraph.style.display === "none") { 
        paragraph.style.display = "block"; 
    } else { 
        paragraph.style.display = "none";    } 
});  
// Reset page 
document.getElementById("reset").addEventListener("click", function () { 
    heading.innerHTML = "Welcome to JavaScript Lab"; 
    paragraph.style.display = "block"; 
    paragraph.style.fontSize = "16px"; 
    document.body.style.backgroundColor = "#f4f4f4"; 
    input.value = ""; 
    fontSize = 16; 
});
        </script>
</body>
</html>
