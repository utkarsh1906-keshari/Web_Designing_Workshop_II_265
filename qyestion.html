<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Armstrong Number Checker</title>

    <!-- Bootstrap CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    />

    <style>
        body {
            background: linear-gradient(135deg, #74ebd5, #9face6);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            width: 100%;
            max-width: 500px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        #result {
            font-size: 1.2rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="card p-4">
        <h2 class="text-center mb-4">Armstrong Number Checker</h2>

        <div class="mb-3">
            <label for="number" class="form-label">Enter a Number</label>
            <input
                type="number"
                id="number"
                class="form-control"
                placeholder="Enter number"
            />
        </div>

        <button class="btn btn-primary w-100" onclick="checkArmstrong()">
            Check
        </button>

        <div id="result" class="text-center mt-4"></div>
    </div>

    <script>
        function checkArmstrong() {
            let num = document.getElementById("number").value;
            let result = document.getElementById("result");

            // Check if input is empty
            if (num === "") {
                result.innerHTML = "Please enter a number.";
                result.className = "text-center mt-4 text-warning";
                return;
            }

            let originalNum = parseInt(num);
            let temp = originalNum;
            let digits = num.length;
            let sum = 0;

            while (temp > 0) {
                let digit = temp % 10;
                sum += Math.pow(digit, digits);
                temp = Math.floor(temp / 10);
            }

            if (sum === originalNum) {
                result.innerHTML = `${originalNum} is an Armstrong Number.`;
                result.className = "text-center mt-4 text-success";
            } else {
                result.innerHTML = `${originalNum} is NOT an Armstrong Number.`;
                result.className = "text-center mt-4 text-danger";
            }
        }
    </script>

</body>
</html>
